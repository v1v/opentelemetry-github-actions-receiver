dist:
  name: otelcol-custom
  output_path: ./bin

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.154.0
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.154.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.154.0
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.154.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.154.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver v0.154.0
  - gomod: github.com/v1v/opentelemetry-github-actions-receiver v0.154.0
    name: githubactionsreceiver
    path: .

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.154.0
  - gomod: go.opentelemetry.io/collector/extension/zpagesextension v0.154.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/pprofextension v0.154.0
